name: Run BNG Metric Journey Tests (via run-journey-tests path)

# Kept so service repos can call:
#   uses: DEFRA/bng-metric-journey-tests/run-journey-tests@main
# Delegates to the root action.yml — keep inputs in sync with it.

inputs:
  bng-metric-frontend-tag:
    description: Docker image tag for bng-metric-frontend (defaults to latest)
    required: false
    default: latest
  bng-metric-backend-tag:
    description: Docker image tag for bng-metric-backend (defaults to latest)
    required: false
    default: latest

runs:
  using: composite
  steps:
    - uses: ./
      with:
        bng-metric-frontend-tag: ${{ inputs.bng-metric-frontend-tag }}
        bng-metric-backend-tag: ${{ inputs.bng-metric-backend-tag }}
