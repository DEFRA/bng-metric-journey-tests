name: Run BNG Metric Journey Tests
description: End-to-end regression suite for the Biodiversity Net Gain Metric Tool

inputs:
  bng-metric-frontend-tag:
    description: Docker image tag for bng-metric-frontend (defaults to latest)
    required: false
    default: latest
  bng-metric-backend-tag:
    description: Docker image tag for bng-metric-backend (defaults to latest)
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Docker login
      uses: DEFRA/cdp-build-action/docker-login@main

    - name: Pull latest service images
      shell: bash
      run: docker compose pull --quiet

    - name: Start Docker Compose stack
      shell: bash
      env:
        BNG_METRIC_FRONTEND_TAG: ${{ inputs.bng-metric-frontend-tag }}
        BNG_METRIC_BACKEND_TAG: ${{ inputs.bng-metric-backend-tag }}
      run: docker compose up --wait --wait-timeout 120 -d

    - name: Run Playwright tests
      shell: bash
      env:
        BROWSER: ${{ env.BROWSER || 'chromium' }}
      run: npm run test:github

    - name: Collect Docker Compose logs
      if: always()
      shell: bash
      run: docker compose logs > logs.txt

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: ./playwright-report

    - name: Upload Docker Compose logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: docker-compose-logs
        path: ./logs.txt
