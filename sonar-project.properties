sonar.projectKey=DEFRA_bng-metric-journey-tests
sonar.organization=defra

sonar.sources=test
sonar.exclusions=test/evidence/**,test/example-files/**

# Playwright spec files wrap all tests in a single test.describe callback, which
# intentionally exceeds the default 75-line function limit. Suppress S138 for
# spec files only — all other rules remain active.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S138
sonar.issue.ignore.multicriteria.e1.resourceKey=**/specs/**/*.spec.js
