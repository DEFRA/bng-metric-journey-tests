sonar.projectKey=DEFRA_bng-metric-journey-tests
sonar.organization=defra

sonar.sources=test
sonar.exclusions=test/evidence/**,test/example-files/**,playwright.evidence.config.js

# Spec files intentionally use patterns that trigger several Sonar rules:
#   S104  — file length: large spec files grow with each new test scenario
#   S138  — function length: test.describe callbacks exceed 75 lines by design
#   S109  — magic numbers: cell indices (e.g. .nth(3)) are self-evident in tests
#   S1192 — duplicate string literals: repeated locator strings are intentional
#   S2699 — "tests should include assertions": false-positive when assertions
#           live in a shared page-object/flow/util helper (per AGENTS, reusable
#           assertions belong in page objects or flows), so the assertion is real
#           but not inline where Sonar looks for it.
# Suppress these rules for spec files only; all other rules remain active.
# Playwright config files also suppress S109 for numeric port/timeout constants.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S138
sonar.issue.ignore.multicriteria.e1.resourceKey=**/specs/**/*.spec.js
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S109
sonar.issue.ignore.multicriteria.e2.resourceKey=playwright*.config.js
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S109
sonar.issue.ignore.multicriteria.e3.resourceKey=**/specs/**/*.spec.js
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S1192
sonar.issue.ignore.multicriteria.e4.resourceKey=**/specs/**/*.spec.js
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S104
sonar.issue.ignore.multicriteria.e5.resourceKey=**/specs/**/*.spec.js
sonar.issue.ignore.multicriteria.e6.ruleKey=javascript:S2699
sonar.issue.ignore.multicriteria.e6.resourceKey=**/specs/**/*.spec.js

# Disable copy-paste detection for this repo. It contains only E2E/journey tests
# — specs, page objects and flows are structurally parallel by necessity (e.g.
# the baseline and post-intervention upload journeys mirror one shared frontend
# template), so duplication detection produces noise, not signal. Mirrors the
# blanket sonar.coverage.exclusions below for the same "test-only repo" reason.
sonar.cpd.exclusions=**/*

# This repo contains E2E/journey tests only — there are no unit tests and no
# coverage reports. Exclude all sources so SonarCloud does not fail the
# "Coverage on New Code" quality gate.
sonar.coverage.exclusions=**/*

