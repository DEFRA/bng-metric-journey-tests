################################################################################
# Docker Compose file for starting up the full BNG Metric stack for testing.
#
# Infrastructure:
#   - postgres, redis, localstack (s3, sqs, sns)
#
# Application services:
#   - bng-metric-frontend  (port 3000)
#   - bng-metric-backend   (port 3001)
#
# Init scripts in docker/scripts/ pre-populate LocalStack resources on startup.
# Per-service env config is in docker/config/.
# All services share the bng-journey-tests network and resolve each other by name.
#
# Run:
#   docker compose pull
#   docker compose up --wait
#   npm run test:github
#
# To pin a specific image version:
#   BNG_METRIC_FRONTEND_TAG=abc123 BNG_METRIC_BACKEND_TAG=abc123 docker compose up
#
################################################################################
networks:
  bng-journey-tests:
    driver: bridge

services:
  ################################################################################
  postgres:
    image: postgis/postgis:16-3.4
    networks:
      - bng-journey-tests
    environment:
      - POSTGRES_DB=bng_metric_backend
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'dev', '-d', 'bng_metric_backend']
      interval: 5s
      start_period: 5s
      retries: 5

  ################################################################################
  localstack:
    image: localstack/localstack:3.2.0
    networks:
      bng-journey-tests:
        aliases:
          - sqs.us-east-1.localstack
          - sqs.eu-west-2.localstack
    environment:
      - LOCALSTACK_HOST=localstack
      - SERVICES=s3,sqs,sns,dynamodb
      - LS_LOG=WARN
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3

  ################################################################################
  redis:
    image: redis:7
    networks:
      - bng-journey-tests
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      start_period: 2s
      retries: 5

  ################################################################################
  # Runs Liquibase migrations against Postgres before the backend starts.
  # BNG_METRIC_BACKEND_PATH controls where the changelog is mounted from:
  #   - CI (backend checked out to ./bng-metric-backend):  BNG_METRIC_BACKEND_PATH=./bng-metric-backend
  #   - Local (sibling repo):                              BNG_METRIC_BACKEND_PATH=../bng-metric-backend (default)
  db-migrations:
    image: liquibase/liquibase:5.0.2
    networks:
      - bng-journey-tests
    volumes:
      - ${BNG_METRIC_BACKEND_PATH:-../bng-metric-backend}/changelog:/liquibase/changelog
      - ./docker/liquibase-drivers/postgresql-42.7.8.jar:/liquibase/lib/postgresql-42.7.8.jar
    command:
      - sh
      - -c
      - >
        liquibase
        --changelog-file=changelog/db.changelog.xml
        --url=jdbc:postgresql://postgres:5432/bng_metric_backend
        --username=dev
        --password=dev
        update
    depends_on:
      postgres:
        condition: service_healthy

  ################################################################################
  bng-metric-backend:
    image: defradigital/bng-metric-backend:${BNG_METRIC_BACKEND_TAG:-latest}
    networks:
      - bng-journey-tests
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/bng-metric-backend.env
    environment:
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 5s
      start_period: 10s
      retries: 5

  ################################################################################
  # CDP Uploader — handles multipart file uploads, virus scanning (mocked in
  # development), and S3 storage.  APP_BASE_URL must use localhost so the upload
  # URL embedded in the form action is reachable from the test browser on the host.
  cdp-uploader:
    image: defradigital/cdp-uploader:latest
    networks:
      - bng-journey-tests
    environment:
      PORT: 7337
      NODE_ENV: development
      APP_BASE_URL: 'http://localhost:7337'
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: 'true'
      S3_ENDPOINT: 'http://localstack:4566'
      SQS_ENDPOINT: 'http://localstack:4566'
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      CONSUMER_BUCKETS: baseline-files
      S3_CDP_QUARANTINE_BUCKET: cdp-uploader-quarantine
      MOCK_VIRUS_SCAN_ENABLED: 'true'
    ports:
      - '7337:7337'
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7337/health']
      interval: 5s
      start_period: 10s
      retries: 5

  ################################################################################
  cdp-defra-id-stub:
    # Pinned: 0.35.0/0.36.0 changed the /register flow and broke auth.setup.js
    # (the global-setup never reaches /relationship). 0.34.0 is the last
    # known-good version. Bump deliberately once auth.setup.js supports the
    # newer stub flow.
    image: defradigital/cdp-defra-id-stub:0.34.0
    networks:
      bng-journey-tests:
        aliases:
          - localhost
    environment:
      PORT: 3200
      NODE_ENV: development
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: 'true'
      # Canonical base URL used in OIDC discovery and redirect construction.
      # Must use the Docker service name so the frontend server can reach the
      # token endpoint container-to-container.  The browser reaches the stub
      # via the route interceptor in auth.setup.js which rewrites this to localhost.
      APP_BASE_URL: 'http://cdp-defra-id-stub:3200'
    ports:
      - '3200:3200'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3200/health']
      interval: 5s
      start_period: 5s
      retries: 3

  ################################################################################
  bng-metric-frontend:
    image: defradigital/bng-metric-frontend:${BNG_METRIC_FRONTEND_TAG:-latest}
    networks:
      - bng-journey-tests
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/bng-metric-frontend.env
    environment:
      - PORT=3000
    ports:
      - 3000:3000
    depends_on:
      bng-metric-backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      cdp-defra-id-stub:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 5s
      start_period: 10s
      retries: 5
