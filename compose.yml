################################################################################
# Docker Compose file for starting up the full BNG Metric stack for testing.
#
# Infrastructure:
#   - mongodb, redis, localstack (s3, sqs, sns)
#
# Application services:
#   - bng-metric-frontend  (port 3000)
#   - bng-metric-backend   (port 3001)
#
# Init scripts in docker/scripts/ pre-populate LocalStack resources on startup.
# Per-service env config is in docker/config/.
# All services share the bng-journey-tests network and resolve each other by name.
#
# Run:
#   docker compose pull
#   docker compose up --wait
#   npm run test:github
#
# To pin a specific image version:
#   BNG_METRIC_FRONTEND_TAG=abc123 BNG_METRIC_BACKEND_TAG=abc123 docker compose up
#
################################################################################
networks:
  bng-journey-tests:
    driver: bridge

services:
  ################################################################################
  mongodb:
    image: mongo:6
    networks:
      - bng-journey-tests
    volumes:
      - ./docker/scripts/mongodb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.hello().ok']
      interval: 5s
      start_period: 5s
      retries: 3

  ################################################################################
  localstack:
    image: localstack/localstack:3.2.0
    networks:
      - bng-journey-tests
    environment:
      - LOCALSTACK_HOST=localstack
      - SERVICES=s3,sqs,sns,dynamodb
      - LS_LOG=WARN
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3

  ################################################################################
  redis:
    image: redis:7
    networks:
      - bng-journey-tests
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      start_period: 2s
      retries: 5

  ################################################################################
  bng-metric-backend:
    image: defradigital/bng-metric-backend:${BNG_METRIC_BACKEND_TAG:-latest}
    networks:
      - bng-journey-tests
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/bng-metric-backend.env
    environment:
      - PORT=3001
    depends_on:
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 5s
      start_period: 10s
      retries: 5

  ################################################################################
  bng-metric-frontend:
    image: defradigital/bng-metric-frontend:${BNG_METRIC_FRONTEND_TAG:-latest}
    networks:
      - bng-journey-tests
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/bng-metric-frontend.env
    environment:
      - PORT=3000
    ports:
      - 3000:3000
    depends_on:
      bng-metric-backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 5s
      start_period: 10s
      retries: 5
