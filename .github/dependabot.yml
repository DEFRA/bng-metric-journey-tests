version: 2

updates:
  # Update npm packages
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 10

    # Group low-risk updates into shared PRs
    groups:
      types:
        patterns:
          - '@types/*'
      dev-dependencies:
        dependency-type: development

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'

    versioning-strategy: increase

    # Hold new PRs for a few days after a release so auto-merge does not pull in
    # a version that gets yanked shortly after publishing. Longer hold for the
    # riskier bumps.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

    allow:
      # Include direct package.json updates
      - dependency-type: direct

  # Update GitHub Actions
  - package-ecosystem: github-actions
    directory: /

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'

    # Hold new PRs for a few days after a release (see npm block above).
    # GitHub Actions is not semver-versioned, so only default-days is supported.
    cooldown:
      default-days: 7

  # Update the Docker base image
  - package-ecosystem: docker
    directory: /

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'

    # Hold new PRs for a few days after a release (see npm block above).
    cooldown:
      default-days: 7
