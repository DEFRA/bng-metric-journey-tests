name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  lint-and-format:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
  journey-tests:
    name: Run Journey Tests
    uses: ./.github/workflows/journey-tests.yml
    with:
      frontend-branch: main
      backend-branch: main
