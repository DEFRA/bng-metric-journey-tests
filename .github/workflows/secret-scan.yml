name: Secret Scan

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  # Run against the merge queue's temporary branch so the scan covers the
  # merge commit the queue actually merges, matching the frontend workflow.
  merge_group:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    name: trufflehog (verified only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: trufflehog
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          extra_args: --only-verified
          # Pin the scanner image by digest as well as tag — without this, the action defaults to `latest`.
          version: 3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
